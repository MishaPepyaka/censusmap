polygonLayer.eachLayer(function(layer){layer.on('click',function(){selectZone(layer)});layer.on('tap',function(){selectZone(layer)});var props=(layer.feature&&layer.feature.properties)||{};var cu=extractCuCode(props);var code=extractBlockCode(props);var center=getZoneCenter(layer);var icon=L.divIcon({className:'zone-chip-wrap',html:'<span class="zone-chip"><span class="block-badge">'+code+'</span><span class="zone-chip-text">'+cu+'</span></span>',iconAnchor:[12,12]});L.marker(center,{icon:icon,interactive:false}).addTo(badgeLayer)});
if(polygonLayer.getLayers().length>0){map.fitBounds(polygonLayer.getBounds(),{padding:[20,20]})}
var userMarker=null,userAccuracy=null,lastKnownLatLng=null;
function upsertUserLocation(latlng,accuracyMeters){lastKnownLatLng=latlng;if(!userMarker){var icon=L.divIcon({className:'user-person-wrap',html:'<span class="user-person-marker"><span class="user-person-head"></span><span class="user-person-body"></span></span>',iconSize:[24,32],iconAnchor:[12,24]});userMarker=L.marker(latlng,{icon:icon,interactive:false}).addTo(map)}else{userMarker.setLatLng(latlng)}if(!userAccuracy){userAccuracy=L.circle(latlng,{radius:accuracyMeters,color:'#2563eb',fillColor:'#60a5fa',fillOpacity:0.14,weight:1}).addTo(map)}else{userAccuracy.setLatLng(latlng);userAccuracy.setRadius(accuracyMeters)}}
function requestCurrentLocation(){if(!navigator.geolocation)return Promise.resolve(null);return new Promise(function(resolve){navigator.geolocation.getCurrentPosition(function(pos){resolve(pos)},function(){resolve(null)},{enableHighAccuracy:true,timeout:20000,maximumAge:0})})}
function startBrowserWatch(){if(!navigator.geolocation)return;navigator.geolocation.watchPosition(function(position){if(!position||!position.coords)return;var latlng=L.latLng(position.coords.latitude,position.coords.longitude);upsertUserLocation(latlng,position.coords.accuracy||0)},function(){},{enableHighAccuracy:true,timeout:20000,maximumAge:5000})}
var locateBtn=document.getElementById('locate-btn'); if(locateBtn){locateBtn.addEventListener('click',function(event){event.preventDefault();event.stopPropagation();if(lastKnownLatLng){map.flyTo(lastKnownLatLng,Math.max(map.getZoom(),15),{duration:0.6});return;}requestCurrentLocation().then(function(position){if(position&&position.coords){var latlng=L.latLng(position.coords.latitude,position.coords.longitude);upsertUserLocation(latlng,position.coords.accuracy||0);map.flyTo(latlng,Math.max(map.getZoom(),15),{duration:0.6})}else{alert('Location is unavailable. In iPhone Safari, allow Location permission and open via https:// if needed.')}})})}
var basemapBtn=document.getElementById('basemap-btn'); if(basemapBtn){basemapBtn.addEventListener('click',function(event){event.preventDefault();event.stopPropagation();toggleBaseMode()})}
requestCurrentLocation().then(function(position){if(position&&position.coords){var latlng=L.latLng(position.coords.latitude,position.coords.longitude);upsertUserLocation(latlng,position.coords.accuracy||0)}});startBrowserWatch();
})();
