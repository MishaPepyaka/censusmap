<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CLD Map Viewer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css?v=20260609b" />
    <link rel="stylesheet" href="/styles.css?v=20260609b" />
  </head>
  <body>
    <main id="map"></main>
    <div class="app-version-badge">v20260609b</div>

    <footer class="app-attribution">
      <a href="https://geo.statcan.gc.ca/geo_wa/rest/services/2025/lcsd000a25s_e/MapServer" target="_blank" rel="noreferrer">Statcan Map</a>.
      Maps are used under <a href="https://www.statcan.gc.ca/en/reference/licence" target="_blank" rel="noreferrer">Statistics Canada Open Licence</a>.
    </footer>

    <section id="route-ui" aria-label="Region actions">
      <div class="route-ui-top">
        <div id="route-label">Loading region...</div>
        <div id="route-subtitle"></div>
      </div>
    </section>

    <div id="map-ui">
      <button id="locate-btn" class="map-action-btn" type="button" aria-label="Focus on my location" title="Focus on my location"></button>
      <button id="basemap-btn" class="map-action-btn map-action-btn-leaf" type="button" aria-label="Switch base map (current: Satellite)" title="Switch base map (current: Satellite)"></button>
    </div>

    <script src="/vendor/leaflet/leaflet.js?v=20260609b"></script>
    <script src="/app.js?v=20260609b"></script>
  </body>
</html>
