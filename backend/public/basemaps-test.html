<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leaflet Basemap Test</title>
    <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", Tahoma, sans-serif;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      .panel {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #c9d2de;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.14);
        padding: 10px;
        width: min(420px, calc(100vw - 24px));
      }

      .panel h1 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .panel p {
        margin: 0 0 8px;
        font-size: 12px;
        line-height: 1.35;
        color: #243447;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      label {
        font-size: 12px;
        color: #1f2d3d;
        white-space: nowrap;
      }

      select {
        flex: 1;
        min-width: 0;
        font-size: 13px;
        padding: 7px 8px;
        border: 1px solid #93a4b8;
        border-radius: 8px;
        background: #fff;
      }

      .status {
        margin-top: 8px;
        font-size: 11px;
        color: #516376;
      }

      .leaflet-control-attribution {
        font-size: 10px;
      }

      @media (max-width: 680px) {
        .panel {
          top: 8px;
          left: 8px;
          right: 8px;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="panel">
      <h1>Leaflet Basemap Test</h1>
      <p>
        Leaflet can use any XYZ/WMS/WMTS source. This page lists common free
        XYZ basemaps for testing.
      </p>
      <div class="row">
        <label for="basemap-select">Basemap</label>
        <select id="basemap-select"></select>
      </div>
      <div class="status" id="status"></div>
    </div>

    <script src="./vendor/leaflet/leaflet.js"></script>
    <script>
      const map = L.map("map", { zoomControl: true }).setView([54.012, -97.72], 11);

      const basemapConfigs = [
        {
          group: "OpenStreetMap",
          id: "osm-standard",
          label: "OpenStreetMap Standard",
          url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
          options: {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap contributors"
          }
        },
        {
          group: "OpenStreetMap",
          id: "osm-hot",
          label: "OpenStreetMap HOT",
          url: "https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png",
          options: {
            maxZoom: 20,
            subdomains: "abc",
            attribution: "&copy; OpenStreetMap contributors, Tiles style by Humanitarian OpenStreetMap Team"
          }
        },
        {
          group: "OpenStreetMap",
          id: "opentopo",
          label: "OpenTopoMap",
          url: "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
          options: {
            maxZoom: 17,
            subdomains: "abc",
            attribution: "Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap"
          }
        },
        {
          group: "OpenStreetMap",
          id: "cyclosm",
          label: "CyclOSM",
          url: "https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png",
          options: {
            maxZoom: 20,
            subdomains: "abc",
            attribution: "&copy; OpenStreetMap contributors, style: &copy; CyclOSM"
          }
        },
        {
          group: "CARTO",
          id: "carto-positron",
          label: "CARTO Positron",
          url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
          options: {
            maxZoom: 20,
            subdomains: "abcd",
            attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
          }
        },
        {
          group: "CARTO",
          id: "carto-positron-nolabels",
          label: "CARTO Positron (No Labels)",
          url: "https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",
          options: {
            maxZoom: 20,
            subdomains: "abcd",
            attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
          }
        },
        {
          group: "CARTO",
          id: "carto-voyager",
          label: "CARTO Voyager",
          url: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
          options: {
            maxZoom: 20,
            subdomains: "abcd",
            attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
          }
        },
        {
          group: "CARTO",
          id: "carto-voyager-nolabels",
          label: "CARTO Voyager (No Labels)",
          url: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png",
          options: {
            maxZoom: 20,
            subdomains: "abcd",
            attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
          }
        },
        {
          group: "CARTO",
          id: "carto-darkmatter",
          label: "CARTO Dark Matter",
          url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
          options: {
            maxZoom: 20,
            subdomains: "abcd",
            attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
          }
        },
        {
          group: "CARTO",
          id: "carto-darkmatter-nolabels",
          label: "CARTO Dark Matter (No Labels)",
          url: "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png",
          options: {
            maxZoom: 20,
            subdomains: "abcd",
            attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
          }
        },
        {
          group: "Esri",
          id: "esri-worldimagery",
          label: "Esri World Imagery (Satellite)",
          url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
          options: {
            maxZoom: 22,
            attribution: "Tiles &copy; Esri"
          }
        },
        {
          group: "Esri",
          id: "esri-street",
          label: "Esri World Street Map",
          url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}",
          options: {
            maxZoom: 22,
            attribution: "Tiles &copy; Esri"
          }
        },
        {
          group: "Esri",
          id: "esri-topo",
          label: "Esri World Topo Map",
          url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
          options: {
            maxZoom: 22,
            attribution: "Tiles &copy; Esri"
          }
        },
        {
          group: "Esri",
          id: "esri-natgeo",
          label: "Esri NatGeo World Map",
          url: "https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}",
          options: {
            maxZoom: 16,
            attribution: "Tiles &copy; Esri"
          }
        },
        {
          group: "Esri",
          id: "esri-light-gray",
          label: "Esri Light Gray Canvas",
          url: "https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}",
          options: {
            maxZoom: 16,
            attribution: "Tiles &copy; Esri"
          }
        },
        {
          group: "Esri",
          id: "esri-dark-gray",
          label: "Esri Dark Gray Canvas",
          url: "https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}",
          options: {
            maxZoom: 16,
            attribution: "Tiles &copy; Esri"
          }
        },
        {
          group: "Wikimedia",
          id: "wikimedia",
          label: "Wikimedia Maps",
          url: "https://maps.wikimedia.org/osm-intl/{z}/{x}/{y}.png",
          options: {
            maxZoom: 19,
            attribution: "&copy; OpenStreetMap contributors, Wikimedia maps"
          }
        }
      ];

      const layersById = new Map();
      for (const cfg of basemapConfigs) {
        layersById.set(cfg.id, L.tileLayer(cfg.url, cfg.options));
      }

      const select = document.getElementById("basemap-select");
      const status = document.getElementById("status");

      function buildSelect() {
        const groups = new Map();
        for (const cfg of basemapConfigs) {
          if (!groups.has(cfg.group)) groups.set(cfg.group, []);
          groups.get(cfg.group).push(cfg);
        }

        for (const [group, items] of groups.entries()) {
          const optGroup = document.createElement("optgroup");
          optGroup.label = group;
          for (const item of items) {
            const option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.label;
            optGroup.appendChild(option);
          }
          select.appendChild(optGroup);
        }
      }

      let activeLayer = null;
      let activeId = null;

      function setBasemap(id) {
        if (id === activeId) return;
        const next = layersById.get(id);
        if (!next) return;

        if (activeLayer) {
          map.removeLayer(activeLayer);
        }

        activeId = id;
        activeLayer = next;
        next.addTo(map);

        const chosen = basemapConfigs.find((x) => x.id === id);
        status.textContent = chosen
          ? `Current: ${chosen.label} (${chosen.group})`
          : "";
      }

      buildSelect();
      select.addEventListener("change", () => setBasemap(select.value));

      const defaultId = "esri-worldimagery";
      select.value = defaultId;
      setBasemap(defaultId);
    </script>
  </body>
</html>
