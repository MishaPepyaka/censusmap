<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CLD Region Editor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css?v=20260720a" />
    <link rel="stylesheet" href="/styles.css?v=20260721k" />
  </head>
  <body>
    <main id="map"></main>
    <div class="app-version-badge">v20260721k</div>

    <footer class="app-attribution">
      <a href="https://geoprod.statcan.gc.ca/camv1/index.html" target="_blank" rel="noreferrer">Publicly Available Map Source</a>.
      Maps are used under <a href="https://www.statcan.gc.ca/en/reference/licence" target="_blank" rel="noreferrer">Statistics Canada Open Licence</a>.
    </footer>

    <div id="map-ui">
      <button id="locate-btn" class="map-action-btn" type="button" aria-label="Focus on my location" title="Focus on my location"></button>
      <button id="basemap-btn" class="map-action-btn map-action-btn-leaf" type="button" aria-label="Switch base map (current: Satellite)" title="Switch base map (current: Satellite)"></button>
    </div>

    <section id="editor-panel">
      <div class="editor-route-head">
        <div id="editor-route-label">Loading editor...</div>
        <div class="editor-route-links">
          <a id="editor-view-link" class="route-link-btn" href="#">Viewer</a>
          <a class="route-link-btn" href="/">Find CLD</a>
        </div>
      </div>

      <button id="dwellings-collapse-btn" type="button" class="editor-collapse-btn" aria-expanded="false">Dwellings Editor</button>
      <div id="dwellings-form-wrap">
        <div class="editor-help">
          Tap a `CU` or `Block` to select it.
        </div>

        <details class="editor-group" open>
          <summary class="editor-group-title">Dwelling Details</summary>
          <div class="editor-group-body">
            <label class="editor-label">CU
              <input id="dwelling-cu" class="editor-input" type="text" placeholder="46221114" />
            </label>
            <label class="editor-label">Block
              <input id="dwelling-block" class="editor-input" type="text" placeholder="01" />
            </label>
            <label class="editor-label">Dwelling No
              <input id="dwelling-no" class="editor-input" type="text" placeholder="0001" />
            </label>
            <label class="editor-label">Status
              <select id="dwelling-status" class="editor-input">
                <option value="429">429</option>
                <option value="400">400</option>
                <option value="402">402</option>
                <option value="701">701</option>
                <option value="500">500</option>
                <option value="312">312</option>
                <option value="324">324</option>
              </select>
            </label>
            <label class="editor-label">Notes
              <textarea id="dwelling-notes" class="editor-input editor-textarea" rows="2" placeholder="Notes"></textarea>
            </label>

            <div class="editor-row-actions">
              <button id="dwelling-new-btn" type="button" class="editor-save-btn">New</button>
              <button id="dwelling-save-btn" type="button" class="editor-save-btn">Save</button>
              <button id="dwelling-delete-btn" type="button" class="editor-danger-btn">Delete</button>
            </div>
          </div>
        </details>

        <details class="editor-group" open>
          <summary class="editor-group-title">Bulk Actions</summary>
          <div class="editor-group-body">
            <div class="editor-help">Save all pending dwelling changes at once.</div>
            <button id="dwelling-save-all-btn" type="button" class="editor-save-btn" disabled>Save All Dwellings</button>
          </div>
        </details>

      </div>
    </section>

    <script src="/vendor/leaflet/leaflet.js?v=20260721a"></script>
    <script src="/app-edit.js?v=20260721g"></script>
  </body>
</html>
