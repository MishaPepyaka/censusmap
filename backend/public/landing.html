<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Find CLD</title>
    <link rel="icon" type="image/svg+xml" href="/flag-logo.svg?v=20260604i" />
    <link rel="apple-touch-icon" href="/flag-logo.svg?v=20260604i" />
    <link rel="stylesheet" href="/styles.css?v=20260604i" />
  </head>
  <body class="landing-body">
    <div class="app-version-badge">v20260604i</div>
    <main class="landing-shell">
      <section class="landing-card">
        <p class="landing-eyebrow">Dedicated CLD Viewer</p>
        <h1 class="landing-title">Enter a CLD number or SSID</h1>
        <p class="landing-copy">
          The app resolves the entry to the correct CLD and opens the region viewer.
        </p>
        <form id="lookup-form" class="lookup-form">
          <label class="landing-label" for="lookup-input">CLD or SSID</label>
          <input
            id="lookup-input"
            class="landing-input"
            type="text"
            autocomplete="off"
            inputmode="text"
            placeholder="3039 or SSID"
          />
          <button id="lookup-submit" class="landing-submit" type="submit">Open Region</button>
          <div id="lookup-status" class="landing-status" aria-live="polite"></div>
        </form>
        <section class="landing-list-wrap" aria-label="Available regions">
          <div class="landing-list-title">Known CLDs</div>
          <div id="region-list" class="landing-list"></div>
        </section>
      </section>
    </main>
    <script src="/app-landing.js?v=20260604i"></script>
  </body>
</html>
