<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User Management - Census Map</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
    <link rel="stylesheet" href="/styles.css?v=20260610d" />
  </head>
  <body class="landing-body">
    <div class="app-version-badge">v20260610d</div>
    <div id="user-widget-root"></div>

    <main class="admin-shell">
      <nav class="admin-nav">
        <a href="/">&larr; Back to Map</a>
      </nav>
      <div class="admin-title">
        <span>User Management</span>
        <button id="add-user-btn" class="admin-btn admin-btn-add">Add New User</button>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th>Username</th>
            <th>Password</th>
            <th>Role</th>
            <th>Direct CLDs</th>
            <th>Crew Leaders</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </main>

    <script src="/app-auth.js?v=20260610d"></script>
    <script>
      (function() {
        const tbody = document.getElementById('users-tbody');
        const addUserBtn = document.getElementById('add-user-btn');
        let currentUser = null;
        let usersCache = [];

        function parseList(value) {
          return String(value || '')
            .split(',')
            .map((item) => item.trim())
            .filter(Boolean);
        }

        function escapeHtml(value) {
          return String(value || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
        }

        async function getJson(url, options) {
          const res = await fetch(url, options);
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || res.statusText);
          return data;
        }

        async function loadCurrentUser() {
          const data = await getJson('/api/me');
          currentUser = data.user || null;
        }

        async function loadUsers() {
          try {
            if (!currentUser) {
              await loadCurrentUser();
            }
            const data = await getJson('/api/admin/users');
            usersCache = data.users || [];
            renderUsers(usersCache);
          } catch (err) {
            if (String(err.message || '').includes('403') || String(err.message || '').includes('401')) {
              window.location.assign('/');
              return;
            }
            alert('Failed to load users: ' + err.message);
          }
        }

        function roleOptions(selectedRole) {
          const roles = ['enumerator', 'crew_leader', 'admin'];
          return roles.map((role) => `<option value="${role}" ${role === selectedRole ? 'selected' : ''}>${role}</option>`).join('');
        }

        function crewLeaderInputValue(user) {
          return (user.crewLeaders || []).map((item) => item.username).join(', ');
        }

        function renderUsers(users) {
          tbody.innerHTML = '';
          const canEditRoles = Boolean(currentUser?.isAdmin);
          users.forEach((user) => {
            const isSelf = currentUser && Number(currentUser.id) === Number(user.id);
            const canEditThisUser = Boolean(currentUser?.isAdmin || (currentUser?.role === 'crew_leader' && (isSelf || (user.role === 'enumerator' && (user.crewLeaderIds || []).includes(Number(currentUser.id))))));
            const role = user.isAdmin ? 'admin' : (user.role || 'enumerator');
            const row = document.createElement('tr');
            row.innerHTML = `
              <td><input type="text" class="admin-input-small" value="${escapeHtml(user.username)}" disabled /></td>
              <td><input type="password" class="admin-input-small" placeholder="••••••" /></td>
              <td>
                <select class="admin-input-small admin-role-select" ${canEditRoles ? '' : 'disabled'}>
                  ${roleOptions(role)}
                </select>
              </td>
              <td><input type="text" class="admin-input-small admin-input-clds" value="${escapeHtml((user.allowedClds || []).join(', '))}" ${canEditRoles ? '' : 'disabled'} /></td>
              <td><input type="text" class="admin-input-small admin-input-crews" value="${escapeHtml(crewLeaderInputValue(user))}" ${canEditRoles ? '' : 'disabled'} /></td>
              <td>
                <button class="admin-btn admin-btn-save">Save</button>
                <button class="admin-btn admin-btn-del">Del</button>
              </td>
            `;

            const passInput = row.querySelector('input[type="password"]');
            const roleSelect = row.querySelector('.admin-role-select');
            const cldsInput = row.querySelector('.admin-input-clds');
            const crewsInput = row.querySelector('.admin-input-crews');
            const saveBtn = row.querySelector('.admin-btn-save');
            const delBtn = row.querySelector('.admin-btn-del');

            if (!canEditThisUser) {
              saveBtn.disabled = true;
              delBtn.disabled = true;
            }

            if (isSelf) {
              delBtn.disabled = true;
            }

            if (!canEditRoles) {
              roleSelect.value = role;
            }

            saveBtn.addEventListener('click', async () => {
              const payload = { password: passInput.value || undefined };
              if (canEditRoles) {
                payload.role = roleSelect.value;
                payload.isAdmin = roleSelect.value === 'admin';
                payload.allowedClds = payload.isAdmin ? [] : parseList(cldsInput.value);
                payload.crewLeaderIds = parseList(crewsInput.value);
              }

              try {
                const res = await fetch(`/api/admin/users/${user.id}`, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || res.statusText);
                passInput.value = '';
                await loadUsers();
              } catch (err) {
                alert(err.message || 'Update failed');
              }
            });

            delBtn.addEventListener('click', async () => {
              if (!confirm(`Delete user ${user.username}?`)) return;
              try {
                const res = await fetch(`/api/admin/users/${user.id}`, { method: 'DELETE' });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || res.statusText);
                await loadUsers();
              } catch (err) {
                alert(err.message || 'Delete failed');
              }
            });

            tbody.appendChild(row);
          });
        }

        addUserBtn.addEventListener('click', async () => {
          const username = prompt('Enter username:');
          if (!username) return;
          const password = prompt('Enter password:');
          if (!password) return;

          let role = 'enumerator';
          let allowedClds = [];
          let crewLeaderIds = [];
          if (currentUser?.isAdmin) {
            role = prompt('Role (enumerator, crew_leader, admin):', 'enumerator') || 'enumerator';
            if (role === 'admin') {
              allowedClds = [];
              crewLeaderIds = [];
            } else {
              allowedClds = parseList(prompt('Direct CLDs (comma separated):', '') || '');
              crewLeaderIds = parseList(prompt('Crew leaders (usernames or ids, comma separated):', '') || '');
            }
          }

          try {
            const res = await fetch('/api/admin/users', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username,
                password,
                role,
                isAdmin: role === 'admin',
                allowedClds,
                crewLeaderIds
              })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || res.statusText);
            await loadUsers();
          } catch (err) {
            alert(err.message || 'Failed to create user');
          }
        });

        loadUsers();
      })();
    </script>
  </body>
</html>
